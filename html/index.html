<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JRCO_VehicleControl</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="hud" id="mainHud">
  <div class="hud-header">
    <div class="hud-title">
      <i class="fa-solid fa-car-side"></i> <span class="white">JRCO</span> Vehicle Control
    </div>
    <button class="close-x" onclick="closeHUD()"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="panel" id="panel-media">
    <div class="sec-title"><i class="fa-solid fa-music"></i> Media Player</div>
    <div class="url-row">
      <input id="urlIn" type="text" placeholder="Stream URL / YouTube link...">
      <button class="add-btn" onclick="addTrack()"><i class="fa-solid fa-plus"></i> Add</button>
    </div>
    <div class="banner">
      <div class="art"><div class="vinyl"><div class="vdot"></div></div></div>
      <div class="tinfo">
        <div class="tname" id="tN">Neon Drive</div>
        <div class="tartist" id="tA">Synthwave Radio</div>
        <div class="progwrap" id="pw"><div class="progfill" id="pf"></div></div>
        <div class="timerow"><span id="tc">0:00</span><span id="tt">3:42</span></div>
      </div>
    </div>
    <div class="ctrlrow">
      <div class="ctrlbtns">
        <div class="cb" onclick="prevT()"><i class="fa-solid fa-backward-step"></i></div>
        <div class="cb play" id="pBtn" onclick="togglePlay()"><span id="pIc"><i class="fa-solid fa-play"></i></span></div>
        <div class="cb" onclick="nextT()"><i class="fa-solid fa-forward-step"></i></div>
        <div class="cb" id="mBtn" onclick="toggleMute()"><span id="mIc"><i class="fa-solid fa-volume-high"></i></span></div>
        <div class="cb" id="shBtn" onclick="toggleShuffle()"><i class="fa-solid fa-shuffle"></i></div>
        <div class="cb" id="rpBtn" onclick="toggleRepeat()"><i class="fa-solid fa-repeat"></i></div>
      </div>
      <div class="volrow">
        <i class="fa-solid fa-volume-low" style="font-size:11px"></i>
        <input type="range" min="0" max="100" value="70" step="1" oninput="setV(this.value)">
        <span id="vv">70</span>
      </div>
    </div>
    <div class="pltoggle" onclick="togglePL()">
      <i class="fa-solid fa-list-music"></i> Playlist
      <span class="plcount" id="plc">3</span>
      <i id="plch" class="fa-solid fa-chevron-down" style="margin-left:auto;font-size:10px"></i>
    </div>
    <div class="playlist" id="pl"></div>
  </div>

  <div class="ctrlrow2">
    <div class="panel" id="panel-windows">
      <div class="sec-title"><i class="fa-solid fa-square-dashed"></i> Windows</div>
      <div class="bg2">
        <div class="kbtn" id="wfl" onclick="nuiAction('toggleWindow',{index:0},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="4" y="10" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="4" y="10" width="12" height="8" rx="1" fill="var(--btn-on)" stroke="var(--acc)" stroke-width="1.3"/><line x1="16" y1="18" x2="23" y2="12" stroke="currentColor" stroke-width="1.3"/><rect x="23" y="8" width="5" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="klabel">FL</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="wfr" onclick="nuiAction('toggleWindow',{index:1},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="20" y="10" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="20" y="18" width="12" height="6" rx="1" fill="var(--btn-on)" stroke="var(--acc)" stroke-width="1.3"/><line x1="20" y1="18" x2="13" y2="12" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="5" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="klabel">FR</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="wrl" onclick="nuiAction('toggleWindow',{index:2},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="4" y="12" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="4" y="12" width="12" height="6" rx="1" fill="var(--btn-on)" stroke="var(--acc)" stroke-width="1.3"/><line x1="16" y1="18" x2="23" y2="14" stroke="currentColor" stroke-width="1.3"/><rect x="23" y="10" width="5" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="klabel">RL</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="wrr" onclick="nuiAction('toggleWindow',{index:3},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="20" y="12" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="20" y="18" width="12" height="6" rx="1" fill="var(--btn-on)" stroke="var(--acc)" stroke-width="1.3"/><line x1="20" y1="18" x2="13" y2="14" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="10" width="5" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="klabel">RR</span><span class="kstatus"></span>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-seats">
      <div class="sec-title"><i class="fa-solid fa-couch"></i> Seats</div>
      <div class="seat-grid" id="seatGrid">
      </div>
      <div class="seat-nocar" id="seatNoCar" style="display:none">
        <i class="fa-solid fa-triangle-exclamation"></i> Enter a vehicle
      </div>
    </div>

    <div class="panel" id="panel-doors">
      <div class="sec-title"><i class="fa-solid fa-door-open"></i> Doors</div>
      <div class="bg2">
        <div class="kbtn" id="dfl" onclick="nuiAction('toggleDoor',{index:0},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="5" y="8" width="12" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="16" cy="18" r="2" fill="currentColor"/><rect x="7" y="11" width="8" height="7" rx="1" stroke="var(--acc)" stroke-width="1.2"/></svg>
          <span class="klabel">FL</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="dfr" onclick="nuiAction('toggleDoor',{index:1},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="19" y="8" width="12" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="20" cy="18" r="2" fill="currentColor"/><rect x="21" y="11" width="8" height="7" rx="1" stroke="var(--acc)" stroke-width="1.2"/></svg>
          <span class="klabel">FR</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="drl" onclick="nuiAction('toggleDoor',{index:2},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="5" y="8" width="12" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="16" cy="20" r="2" fill="currentColor"/><rect x="7" y="16" width="8" height="7" rx="1" stroke="var(--acc)" stroke-width="1.2"/></svg>
          <span class="klabel">RL</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="drr" onclick="nuiAction('toggleDoor',{index:3},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><rect x="19" y="8" width="12" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="20" cy="20" r="2" fill="currentColor"/><rect x="21" y="16" width="8" height="7" rx="1" stroke="var(--acc)" stroke-width="1.2"/></svg>
          <span class="klabel">RR</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="dtrunk" onclick="nuiAction('toggleDoor',{index:4},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><ellipse cx="18" cy="21" rx="12" ry="8" stroke="currentColor" stroke-width="1.6"/><path d="M6 21 Q18 10 30 21" stroke="var(--acc)" stroke-width="1.2" fill="none"/><circle cx="18" cy="21" r="2" fill="currentColor"/></svg>
          <span class="klabel">Trunk</span><span class="kstatus"></span>
        </div>
        <div class="kbtn" id="dhood" onclick="nuiAction('toggleDoor',{index:5},this)">
          
          <svg viewBox="0 0 36 36" fill="none"><ellipse cx="18" cy="16" rx="12" ry="8" stroke="currentColor" stroke-width="1.6"/><path d="M6 16 Q18 26 30 16" stroke="var(--acc)" stroke-width="1.2" fill="none"/><circle cx="18" cy="16" r="2" fill="currentColor"/></svg>
          <span class="klabel">Hood</span><span class="kstatus"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-aux">
    <div class="sec-title"><i class="fa-solid fa-bolt"></i> Auxiliary</div>
    <div class="auxgrid">

      <div class="eng-wrap" onclick="nuiAction('toggleEngine',{},null);engTog()" title="Engine Start/Stop">
        <div class="eng on" id="engBtn">
          <div class="eng-dot"></div>
          <div class="eng-ring">
            <div class="eng-inner">
              <div class="eng-txt">ENGINE<br>START<br>STOP</div>
            </div>
          </div>
        </div>
      </div>

      <div class="kbtn" id="indL" onclick="nuiAction('toggleIndicator',{side:'left'},this)">
        
        <svg viewBox="0 0 36 36" fill="none"><polyline points="18,10 8,18 18,26" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/><line x1="28" y1="18" x2="8" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span class="klabel">Left</span><span class="kstatus"></span>
      </div>

      <div class="kbtn" id="hazBtn" onclick="nuiAction('toggleHazards',{},this)">
        
        <svg viewBox="0 0 36 36" fill="none"><path d="M18 7 L30 28 H6 Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><line x1="18" y1="14" x2="18" y2="22" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="18" cy="25" r="1" fill="currentColor"/></svg>
        <span class="klabel">Hazard</span><span class="kstatus"></span>
      </div>

      <div class="kbtn" id="indR" onclick="nuiAction('toggleIndicator',{side:'right'},this)">
        
        <svg viewBox="0 0 36 36" fill="none"><polyline points="18,10 28,18 18,26" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/><line x1="8" y1="18" x2="28" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span class="klabel">Right</span><span class="kstatus"></span>
      </div>

      <div class="kbtn" id="ltBtn" onclick="nuiAction('toggleLights',{},this)">
        
        <svg viewBox="0 0 36 36" fill="none"><path d="M18 7 a8 8 0 0 1 5 14.2 l0 2.8 H13 l0-2.8 A8 8 0 0 1 18 7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><rect x="14" y="24" width="8" height="3" rx="1" stroke="currentColor" stroke-width="1.4"/><line x1="18" y1="27" x2="18" y2="30" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="8" y1="18" x2="5" y2="18" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="28" y1="18" x2="31" y2="18" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span class="klabel">Lights</span><span class="kstatus"></span>
      </div>

    </div>
  </div>
</div>

<div class="notif" id="notif"><i class="fa-solid fa-circle-check"></i><span id="notif-msg"></span></div>

<div id="yt-player-container" style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;">
  <div id="yt-player"></div>
</div>

<script src="js/music.js"></script>
<script src="js/app.js"></script>
</body>
</html>
